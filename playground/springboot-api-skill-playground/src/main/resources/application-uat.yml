spring:
  config:
    activate:
      on-profile: uat
  datasource:
    url: jdbc:postgresql://${UAT_DB_HOST:localhost}:5432/orders_uat
    username: ${UAT_DB_USER:orders_app}
    password: ${UAT_DB_PASSWORD:}
  cloud:
    gcp:
      pubsub:
        enabled: true
        project-id: ${UAT_GCP_PROJECT:acme-uat}

orders:
  pubsub:
    enabled: true
    created-topic: orders.created.uat
    status-changed-topic: orders.status-changed.uat
