spring:
  application:
    name: springboot-api-skill-playground
  datasource:
    url: jdbc:postgresql://localhost:5432/orders
    username: orders_app
    password: orders_app
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  cloud:
    gcp:
      pubsub:
        enabled: false

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

orders:
  pubsub:
    enabled: false
    created-topic: orders.created.dev
    status-changed-topic: orders.status-changed.dev
