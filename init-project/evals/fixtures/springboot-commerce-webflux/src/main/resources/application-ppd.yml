spring:
  r2dbc:
    url: r2dbc:postgresql://postgres-ppd.internal:5432/commerce
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  redis:
    host: redis-ppd.internal
    port: 6379

commerce:
